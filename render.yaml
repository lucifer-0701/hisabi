services:
  - type: web
    name: hisabi-api
    runtime: node
    region: singapore # Or your preferred region
    plan: free
    buildCommand: npm install && cd backend && npm install
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # User will provide Neon URL
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false # User will provide Vercel URL
